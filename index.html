      "id": "2026-05-12-002",
      "date": "2026-05-12",
      "title": "Breaking the Single-Family Zoning Bottleneck",
      "source": "Politics & Government News",
      "url": "https://politics-government.news-articles.net/content/2026/05/03/breaking-the-single-family-zoning-bottleneck.html",
      "thumbnail": "https://www.news-articles.net/images/dynamic/000/000/000/00e/57f/5.jpg",
      "summary": "This May 3, 2026 analysis examines the nationwide movement to legalize 'Missing Middle Housing'—cottage courts, townhouses, and fourplexes that sit between single-family homes and high-rise apartments—as a strategy to address housing supply inelasticity. The piece outlines four key reform mechanisms now deployed across jurisdictions: ending single-family exclusivity by allowing duplexes and triplexes by-right without variance permits; fast-tracking Accessory Dwelling Unit (ADU) approvals to add rental income and supply; eliminating parking minimums and increasing density around transit hubs under Transit-Oriented Development (TOD) frameworks; and state-level overrides that mandate minimum density requirements to counter local NIMBY sentiment. The political debate pits opponents who cite property values, infrastructure strain, and neighborhood character against YIMBY proponents who argue the social cost of housing instability outweighs aesthetic uniformity. Economically, the article frames density reform as a question of supply elasticity: when housing supply cannot grow regardless of price, prices skyrocket. While reforms alone may not instantly lower prices due to construction costs and labor shortages, they prevent extreme price spikes from artificial scarcity and diversify housing types to serve broader income levels. The piece emphasizes that reforms are spreading from progressive cities to red states, including Georgia's tiny home bills and Georgia HB 1166, which allows secondary units under 400 square feet without local zoning approval.",
      "whyItMatters": "Missing Middle legalization is emerging as the core battleground in North American housing policy, shifting from voluntary local action to state-mandated standards that preempt exclusionary zoning—a trend with direct relevance to Australian infill and medium-density debates.",

        "United States",
        "Zoning Reform",
        "Missing Middle Housing",
        "Policy",
        "ADUs"
      ]

      "summary": "The U.S. Federal Transit Administration announced on May 11, 2026, that $28.5 million is now available through its Fiscal Year 2026 Pilot Program for Transit-Oriented Development Planning. The competitive grant program supports local communities seeking to integrate land use and transportation planning around new fixed-guideway or core-capacity transit capital investments. Applications are due by July 10, 2026. The program aims to enhance economic development, increase transit ridership, facilitate multimodal connectivity, and encourage private sector participation in TOD projects. Priority considerations for funding include safety—how projects create safe routes to schools, childcare, and social services along transit corridors—and innovation, including partnerships with transit agencies and advocates. The program represents a continuation of the Infrastructure Investment and Jobs Act's emphasis on comprehensive planning that links housing, land use, and transportation. There is no minimum or maximum grant award amount, and projects may receive less than requested. The program explicitly encourages planning that supports affordable housing around transit, mixed-use development, and pedestrian and bicycle access to transit hubs. FTA noted the program helps fulfill its mission of building 'Great American Communities' by maintaining or expanding capacity for all travel modes while improving public well-being and climate resilience.",

      "date": "2026-05-13",
      "title": "Above the Tracks: China's Unique Model for Transit-Oriented Development",
      "source": "Planetizen",

      "thumbnail": "https://www.planetizen.com/themes/custom/plnz4/images/404.png",
      "summary": "Published May 8, 2026, Anderson Chider Hsieh examines China's distinctive approach to transit-oriented development, where cities since 2010 have increasingly built mixed-use neighborhoods directly above metro depots and rail yards. The model leverages large tracts of state-owned land near transit infrastructure to create dense, integrated communities atop operational rail facilities. Hsieh's analysis, drawing on examples from Shenzhen and other Chinese cities, highlights how this vertical integration maximizes land value and transit access while maintaining depot functionality below. The approach contrasts sharply with Western TOD models, which typically redevelop adjacent parcels but leave depot sites untouched due to fragmented land ownership, operational constraints, and regulatory barriers. Hsieh argues that U.S. transit agencies could reevaluate the redevelopment potential of their extensive rail yards and depot holdings, which often occupy prime, transit-accessible land in inner-city locations. The article suggests that air-rights development and deck-over strategies could unlock significant housing and mixed-use capacity, though institutional barriers—including federal restrictions on non-transit revenue generation and local zoning—would need reform. The piece positions depot-top development as an untapped frontier for North American TOD, particularly as housing crises intensify pressure to maximize land near existing infrastructure.",

      "date": "2026-05-13",
      "title": "The Australian Housing Landscape as of March 2026",
      "source": "BDO Australia",

      "summary": "BDO's inaugural housing market pulse, published in late April 2026, provides a state-by-state analysis of Australia's housing sector as of March 2026, examining policy reforms, market conditions, and delivery challenges. New South Wales emerges as the most ambitious reformer, with state-led rezonings, expanded complying development pathways, pre-endorsed design pattern books, and the creation of a development coordination authority all signaling serious attempts to tackle pipeline delays. The reforms emphasize higher-density supply in established locations and around transport corridors, with faster approvals and streamlined development pathways designed to support infill housing. However, BDO notes that feasibility remains challenging due to elevated construction costs, tight contracting capacity, and prolonged approval and mobilization timeframes, which squeeze margins through escalation and holding costs. Victoria entered 2026 with subdued conditions as buyers remain price-sensitive and activity concentrates in more affordable segments. Queensland remained one of Australia's best-performing markets in 2025, with Brisbane house prices increasing approximately 9 percent over the year and regional markets recording 13-14 percent growth driven by lifestyle demand and interstate migration, though signs of moderation emerged in late 2025 as affordability tightened. Unit rents stabilized in late 2025, suggesting affordability pressures may be tempering demand. The report emphasizes that long-term delivery will require sustained collaboration, infrastructure investment, and ongoing policy refinement, with stronger tenancy laws expected to enhance renter stability though investor sentiment may remain cautious.",

<article class="detail" id="detail" aria-hidden="true">
  <div class="detail-back">
    <button id="detail-close-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <button class="like-btn" id="detail-like-top">
      <svg class="heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span class="count"></span>
    </button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</article>

<script>
(function(){
  'use strict';

  // ========== CONSTANTS ==========
  const STORAGE_KEY = 'udd_saved_v2';      // { [articleId]: categoryId }
  const OLD_KEY     = 'udd_liked_v1';      // legacy: [articleId, ...]
  const TS_KEY      = 'udd_local_ts';      // last-known updatedAt we synced

  // Cloud sync (JSONBin.io) — personal bin, Access Key scoped to read/update only
  const SYNC = {
    binId:    '69e57c1faaba882197188ff4',
    readKey:  '$2a$10$TEL1UHkdrjCOklCUHRt5L.tlwcehOhiIIm7d1Eri0Thpcn2VixGRK',
    apiBase:  'https://api.jsonbin.io/v3',
  };

  const CATEGORIES = [
    { id: 'melbourne', label: 'Melbourne', color: '#e85d75' },
    { id: 'australia', label: 'Australia', color: '#ffa41b' },
    { id: 'japan',     label: 'Japan',     color: '#d14a4a' },
    { id: 'europe',    label: 'Europe',    color: '#4a7bd8' },
    { id: 'asia',      label: 'Asia',      color: '#7b4ad8' },
    { id: 'other',     label: 'Other',     color: '#8a8a8a' },
  ];
  const CAT_BY_ID = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

  // ========== STATE ==========
  const state = {
    articles: [],
    saved: {},             // { articleId: categoryId }
    tab: 'all',            // 'all' | 'saved'
    savedFilter: 'all',    // 'all' | categoryId
    openId: null,          // article id open in detail modal
    sheetId: null,         // article id whose save-sheet is open
  };

  // ========== STORAGE ==========
  function loadSaved() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { state.saved = JSON.parse(raw); return; }
    } catch(e) {}
    // migrate from legacy
    try {
      const oldRaw = localStorage.getItem(OLD_KEY);
      if (oldRaw) {
        const arr = JSON.parse(oldRaw);
        const mig = {};
        (arr || []).forEach(id => { mig[id] = 'other'; });
        state.saved = mig;
        persistSaved();
      }
    } catch(e) {}
  }
  function persistSaved() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.saved)); } catch(e) {}
  }
  function isSaved(id) { return !!state.saved[id]; }
  function getCat(id) { return state.saved[id] || null; }
  function setCat(id, cat) { state.saved[id] = cat; persistSaved(); schedulePush(); }
  function removeSave(id) { delete state.saved[id]; persistSaved(); schedulePush(); }

  // ========== CLOUD SYNC (JSONBin.io) ==========
  // Strategy: last-write-wins at object level, by ISO updatedAt string.
  // - On page load: fetch remote. If remote is newer than what we last saw locally, replace local with remote. Otherwise push local up.
  // - On save/unsave: update local immediately (fast UI), debounced push to remote.

  async function fetchRemote() {
    try {
      const res = await fetch(`${SYNC.apiBase}/b/${SYNC.binId}/latest`, {
        headers: { 'X-Access-Key': SYNC.readKey }
      });
      if (!res.ok) return null;
      const body = await res.json();
      return body.record || null;
    } catch(e) { return null; }
  }

  async function pushRemote() {
    const now = new Date().toISOString();
    try {
      const res = await fetch(`${SYNC.apiBase}/b/${SYNC.binId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Access-Key': SYNC.readKey
        },
        body: JSON.stringify({ saved: state.saved, updatedAt: now })
      });
      if (res.ok) {
        try { localStorage.setItem(TS_KEY, now); } catch(e) {}
      }
    } catch(e) { /* offline */ }
  }

  let pushTimer = null;
  function schedulePush() {
    clearTimeout(pushTimer);
    pushTimer = setTimeout(pushRemote, 700);
  }

  async function syncInitial() {
    const remote = await fetchRemote();
    if (!remote || !remote.saved) {
      // Remote empty/new — push our local state up to initialize
      if (Object.keys(state.saved).length > 0) pushRemote();
      return;
    }
    const localTs = (function(){ try { return localStorage.getItem(TS_KEY) || ''; } catch(e){ return ''; } })();
    const remoteTs = remote.updatedAt || '';
    // ISO 8601 strings compare lexicographically = chronologically
    if (remoteTs && remoteTs > localTs) {
      // Remote newer: overwrite local
      state.saved = remote.saved || {};
      persistSaved();
      try { localStorage.setItem(TS_KEY, remoteTs); } catch(e) {}
      renderFeed();
      renderSavedBadge();
    } else if (localTs && localTs > remoteTs) {
      // Local newer: push up
      pushRemote();
    }
    // else: equal or both empty — nothing to do
  }

  // ========== UTIL ==========
  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, ch => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[ch]));
  }
  function fmtDate(iso) {
    try {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch(e) { return iso; }
  }
  function fmtDayHeader(iso) {
    try {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    } catch(e) { return iso; }
  }
  function groupByDate(arr) {
    const map = new Map();
    arr.forEach(a => {
      if (!map.has(a.date)) map.set(a.date, []);
      map.get(a.date).push(a);
    });
    return [...map.entries()].sort((a,b) => b[0].localeCompare(a[0]));
  }
  function countByCategory() {
    const counts = Object.fromEntries(CATEGORIES.map(c => [c.id, 0]));
    Object.values(state.saved).forEach(cat => {
      if (counts[cat] != null) counts[cat]++;
    });
    return counts;
  }

  // ========== RENDER ==========
  function heartSvg() {
    return '<svg class="heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>';
  }
  function cardHtml(a) {
    const saved = isSaved(a.id);
    const cat = saved ? CAT_BY_ID[getCat(a.id)] : null;
    const thumb = a.thumbnail
      ? `<img class="card-thumb" src="${escapeHtml(a.thumbnail)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
      : `<div class="card-thumb"></div>`;
    const catLabel = cat
      ? `<span class="card-cat"><span class="cat-dot" style="background:${cat.color}"></span>${escapeHtml(cat.label)}</span>`
      : '';
    return `
      <article class="card" data-id="${escapeHtml(a.id)}">
        <div class="card-inner">
          <div class="card-body">
            <div class="card-meta">
              <span class="card-source">${escapeHtml(a.source)}</span>
              ${catLabel ? `<span>·</span>${catLabel}` : ''}
            </div>
            <h2 class="card-title">${escapeHtml(a.title)}</h2>
            <p class="card-summary">${escapeHtml(a.summary)}</p>
            <div class="card-footer">
              <span class="card-date">${fmtDate(a.date)}</span>
              <button class="like-btn ${saved?'is-liked':''}" data-like="${escapeHtml(a.id)}" aria-label="Save">
                ${heartSvg()}
              </button>
            </div>
          </div>
          ${thumb}
        </div>
      </article>
    `;
  }
  function renderChips() {
    const wrap = document.getElementById('chip-row-wrap');
    const row = document.getElementById('chip-row');
    if (state.tab !== 'saved') {
      wrap.style.display = 'none';
      return;
    }
    wrap.style.display = 'block';
    const counts = countByCategory();
    const total = Object.values(counts).reduce((a,b) => a+b, 0);
    const chips = [
      `<button class="chip ${state.savedFilter==='all'?'is-active':''}" data-chip="all">All <span class="chip-count">${total}</span></button>`,
      ...CATEGORIES.map(c => {
        const n = counts[c.id] || 0;
        return `<button class="chip ${state.savedFilter===c.id?'is-active':''}" data-chip="${c.id}">
          <span class="chip-dot" style="background:${c.color}"></span>${escapeHtml(c.label)}
          <span class="chip-count">${n}</span>
        </button>`;
      })
    ];
    row.innerHTML = chips.join('');
  }
  function renderFeed() {
    const feed = document.getElementById('feed');
    let list = state.articles.slice();
    if (state.tab === 'saved') {
      list = list.filter(a => isSaved(a.id));
      if (state.savedFilter !== 'all') {
        list = list.filter(a => getCat(a.id) === state.savedFilter);
      }
    }
    list.sort((a,b) => b.date.localeCompare(a.date));

    renderChips();

    if (list.length === 0) {
      let msg = 'Tomorrow morning\u2019s digest will appear here.';
      let heading = 'No articles yet';
      if (state.tab === 'saved') {
        if (state.savedFilter === 'all') {
          heading = 'No saved articles yet';
          msg = 'Tap the heart on a card and choose a category to save it here.';
        } else {
          const c = CAT_BY_ID[state.savedFilter];
          heading = `No saved ${c ? c.label : ''} articles yet`;
          msg = 'Save an article to this category from its heart button.';
        }
      }
      feed.innerHTML = `
        <div class="empty">
          <h2>${escapeHtml(heading)}</h2>
          <p>${escapeHtml(msg)}</p>
        </div>`;
      return;
    }

    const grouped = groupByDate(list);
    feed.innerHTML = grouped.map(([date, items]) => `
      <div class="day-header">${fmtDayHeader(date)}</div>
      ${items.map(cardHtml).join('')}
    `).join('');
  }
  function renderSavedBadge() {
    const b = document.getElementById('saved-badge');
    const n = Object.keys(state.saved).length;
    b.textContent = n > 0 ? n : '';
  }

  // ========== DETAIL ==========
  function openDetail(id, opts) {
    opts = opts || {};
    const a = state.articles.find(x => x.id === id);
    if (!a) return;
    state.openId = id;
    // Update URL so per-article highlighter/word-saver extensions can scope by URL
    if (!opts.fromHash) {
      try { history.pushState({ articleId: id }, '', '#/a/' + encodeURIComponent(id)); } catch(e) {}
    }
    const saved = isSaved(id);
    const cat = saved ? CAT_BY_ID[getCat(id)] : null;
    const body = document.getElementById('detail-body');
    const topics = (a.topics || []).map(t => `<span class="topic">${escapeHtml(t)}</span>`).join('');
    const thumb = a.thumbnail
      ? `<img class="detail-thumb" src="${escapeHtml(a.thumbnail)}" alt="">`
      : '';
    const saveLabel = saved ? `Saved · ${cat ? cat.label : ''}` : 'Save';
    body.innerHTML = `
      <div class="detail-meta">
        <span class="card-source">${escapeHtml(a.source)}</span>
        <span>·</span>
        <span>${fmtDate(a.date)}</span>
        ${cat ? `<span>·</span><span class="card-cat"><span class="cat-dot" style="background:${cat.color}"></span>${escapeHtml(cat.label)}</span>` : ''}
      </div>
      <h1 class="detail-title">${escapeHtml(a.title)}</h1>
      ${thumb}
      <p class="detail-summary">${escapeHtml(a.summary)}</p>
      ${a.whyItMatters ? `
        <div class="why">
          <div class="why-label">Why it matters</div>
          <p class="why-text">${escapeHtml(a.whyItMatters)}</p>
        </div>` : ''}
      ${topics ? `<div class="topics">${topics}</div>` : ''}
      <div class="detail-actions">
        <a class="btn btn-primary" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">
          Read original
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M8 7h9v9"/></svg>
        </a>
        <button class="btn btn-like ${saved?'is-liked':''}" id="detail-like-btn">
          ${heartSvg()}
          <span>${saveLabel}</span>
        </button>
      </div>
    `;
    document.getElementById('detail-like-top').classList.toggle('is-liked', saved);
    document.getElementById('detail').classList.add('is-open');
    // Hide list-view UI so the article reads as the page's main content
    document.getElementById('intro').style.display = 'none';
    document.getElementById('chip-row-wrap').style.display = 'none';
    document.getElementById('feed').style.display = 'none';
    window.scrollTo(0, 0);
  }
  function closeDetail(opts) {
    opts = opts || {};
    state.openId = null;
    document.getElementById('detail').classList.remove('is-open');
    document.getElementById('intro').style.display = '';
    document.getElementById('feed').style.display = '';
    // Clear hash so URL is back to index
    if (!opts.fromPop) {
      try {
        if (location.hash && location.hash.indexOf('#/a/') === 0) {
          history.pushState(null, '', location.pathname + location.search);
        }
      } catch(e) {}
    }
    renderFeed(); // also re-shows chip row if needed
  }

  function parseHashArticleId() {
    const h = location.hash || '';
    const m = h.match(/^#\/a\/(.+)$/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  function handleHashChange() {
    const id = parseHashArticleId();
    if (id && state.articles.find(a => a.id === id)) {
      if (state.openId !== id) openDetail(id, { fromHash: true });
    } else {
      if (state.openId) closeDetail({ fromPop: true });
    }
  }

  // ========== BOTTOM SHEET ==========
  function openSheet(articleId) {
    state.sheetId = articleId;
    const saved = isSaved(articleId);
    const currentCat = saved ? getCat(articleId) : null;
    document.getElementById('sheet-title').textContent = saved ? 'Move to…' : 'Save to…';
    const opts = CATEGORIES.map(c => `
      <button class="sheet-opt ${c.id===currentCat?'is-current':''}" data-cat="${c.id}">
        <span class="opt-dot" style="background:${c.color}"></span>
        <span>${escapeHtml(c.label)}</span>
        <span class="opt-check">\u2713</span>
      </button>
    `).join('');
    document.getElementById('sheet-options').innerHTML = opts;
    document.getElementById('sheet-remove').style.display = saved ? 'block' : 'none';
    document.getElementById('sheet').classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    state.sheetId = null;
    document.getElementById('sheet').classList.remove('is-open');
    document.body.style.overflow = '';
  }
  function chooseCategory(cat) {
    if (!state.sheetId) return;
    setCat(state.sheetId, cat);
    const wasInDetail = state.openId === state.sheetId;
    closeSheet();
    renderFeed();
    renderSavedBadge();
    if (wasInDetail) openDetail(state.openId);
  }
  function removeFromSheet() {
    if (!state.sheetId) return;
    const wasInDetail = state.openId === state.sheetId;
    removeSave(state.sheetId);
    closeSheet();
    renderFeed();
    renderSavedBadge();
    if (wasInDetail) openDetail(state.openId);
  }

  // ========== EVENTS ==========
  function bind() {
    // Top tabs
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('is-active'));
        btn.classList.add('is-active');
        state.tab = btn.dataset.tab;
        if (state.tab !== 'saved') state.savedFilter = 'all';
        renderFeed();
      });
    });

    // Feed clicks (cards + like buttons)
    document.getElementById('feed').addEventListener('click', (e) => {
      const likeBtn = e.target.closest('[data-like]');
      if (likeBtn) {
        e.stopPropagation();
        openSheet(likeBtn.dataset.like);
        return;
      }
      const card = e.target.closest('.card');
      if (card) openDetail(card.dataset.id);
    });

    // Chip row clicks
    document.getElementById('chip-row').addEventListener('click', (e) => {
      const chip = e.target.closest('[data-chip]');
      if (!chip) return;
      state.savedFilter = chip.dataset.chip;
      renderFeed();
    });

    // Detail modal
    document.getElementById('detail-close-btn').addEventListener('click', closeDetail);
    document.getElementById('detail').addEventListener('click', (e) => {
      if (e.target.id === 'detail') closeDetail();
    });
    document.addEventListener('click', (e) => {
      if (e.target.closest('#detail-like-btn') && state.openId) {
        openSheet(state.openId);
      }
      if (e.target.closest('#detail-like-top') && state.openId) {
        openSheet(state.openId);
      }
    });

    // Sheet clicks
    document.getElementById('sheet').addEventListener('click', (e) => {
      if (e.target.closest('[data-sheet-close]')) { closeSheet(); return; }
      const opt = e.target.closest('[data-cat]');
      if (opt) { chooseCategory(opt.dataset.cat); return; }
    });
    document.getElementById('sheet-remove').addEventListener('click', removeFromSheet);

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.sheetId) closeSheet();
        else if (state.openId) closeDetail();
      }
    });

    // Back/forward button & external hash navigation
    window.addEventListener('popstate', handleHashChange);
    window.addEventListener('hashchange', handleHashChange);
  }

  // ========== INIT ==========
  async function init() {
    loadSaved();
    bind();
    let data = null;
    try {
      const res = await fetch('data.json?v=' + Date.now());
      if (res.ok) data = await res.json();
    } catch(e) { /* file:// or offline — fall back to inline */ }
    if (!data || !Array.isArray(data.articles) || data.articles.length === 0) {
      try {
        const inline = document.getElementById('initial-data');
        if (inline) data = JSON.parse(inline.textContent);
      } catch(e) {}
    }
    state.articles = (data && data.articles) || [];
    renderFeed();
    renderSavedBadge();
    // If URL arrives with #/a/{id}, auto-open that article (bookmark support)
    const hashId = parseHashArticleId();
    if (hashId && state.articles.find(a => a.id === hashId)) {
      openDetail(hashId, { fromHash: true });
    }
    // Sync saved state from cloud (non-blocking)
    syncInitial();
    // Re-sync when tab becomes visible again (catches changes from other devices)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) syncInitial();
    });
  }
  init();
})();
</script>

</body>
</html>
