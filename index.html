<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#ffffff">
<title>Urban Design Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #2a2a2a;
    --text-sub: #737373;
    --text-faint: #a0a0a0;
    --border: #ececec;
    --border-hover: #d4d4d4;
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --accent: #2cb696;      /* note's signature green */
    --accent-hover: #249a7f;
    --radius: 4px;
    --radius-lg: 8px;
    --max: 720px;
    --font-sans: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --font-serif: "Noto Serif JP", "Hiragino Mincho ProN", "ヒラギノ明朝 ProN", serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }
  a { color: var(--text); text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; color: inherit; }

  /* ============ HEADER ============ */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(255,255,255,0.94);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .site-header-inner {
    max-width: var(--max);
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .site-title {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .site-title .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .tabs { display: flex; gap: 6px; }
  .tab {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-sub);
    padding: 7px 14px;
    border-radius: 999px;
    transition: all 0.15s;
  }
  .tab:hover { background: var(--bg-alt); color: var(--text); }
  .tab.is-active {
    background: var(--text);
    color: #fff;
  }
  .tab .badge {
    display: inline-block;
    margin-left: 6px;
    font-size: 11px;
    font-weight: 700;
    min-width: 16px;
    text-align: center;
  }

  /* ============ INTRO ============ */
  .intro {
    max-width: var(--max);
    margin: 36px auto 20px;
    padding: 0 20px;
  }
  .intro h1 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.35;
    margin: 0 0 8px;
    letter-spacing: 0.01em;
  }
  .intro p {
    color: var(--text-sub);
    font-size: 13.5px;
    margin: 0;
  }

  /* ============ FEED ============ */
  .feed {
    max-width: var(--max);
    margin: 0 auto;
    padding: 8px 20px 80px;
  }
  .day-header {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 28px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .card {
    display: block;
    padding: 22px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .card:hover { opacity: 0.82; }
  .card-inner {
    display: grid;
    grid-template-columns: 1fr 112px;
    gap: 18px;
    align-items: flex-start;
  }
  .card-body { min-width: 0; }
  .card-meta {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-source {
    font-weight: 500;
    color: var(--text-sub);
  }
  .card-title {
    font-weight: 700;
    font-size: 17px;
    line-height: 1.45;
    margin: 0 0 8px;
    letter-spacing: 0.005em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary {
    font-size: 13.5px;
    color: var(--text-sub);
    line-height: 1.65;
    margin: 0 0 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card-date {
    font-size: 12px;
    color: var(--text-faint);
  }
  .card-thumb {
    width: 112px;
    height: 112px;
    border-radius: var(--radius-lg);
    background: var(--bg-alt);
    object-fit: cover;
    flex-shrink: 0;
  }

  /* ============ LIKE BUTTON ============ */
  .like-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-faint);
    padding: 4px 2px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .like-btn:hover { color: var(--text-sub); }
  .like-btn.is-liked { color: var(--accent); }
  .like-btn .heart {
    width: 16px; height: 16px;
    fill: none; stroke: currentColor;
    stroke-width: 1.6;
    transition: all 0.15s;
  }
  .like-btn.is-liked .heart { fill: var(--accent); stroke: var(--accent); }
  .like-btn .count { font-weight: 500; }

  /* ============ EMPTY STATE ============ */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-sub);
  }
  .empty h2 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 18px;
    margin: 0 0 8px;
    color: var(--text);
  }
  .empty p { font-size: 13.5px; margin: 0; }

  /* ============ EXTENSION-FRIENDLY TEXT ============ */
  /* Ensure selection & injection work for DeepL / Google Translate / Super Simple Highlighter / ABC Words Saver etc. */
  .detail-title,
  .detail-summary,
  .why-text,
  .card-title,
  .card-summary,
  .detail-meta,
  .topics {
    -webkit-user-select: text;
    user-select: text;
    cursor: text;
  }
  .card-title, .card-summary { cursor: pointer; } /* card is still clickable, but text selectable */

  /* ============ ARTICLE DETAIL (page-level, not modal) ============ */
  .detail {
    display: none;
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 20px 80px;
  }
  .detail.is-open { display: block; }
  .detail-back {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 8px;
    margin-bottom: 8px;
  }
  .detail-back button {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13.5px;
    color: var(--text-sub);
    padding: 6px 10px;
    border-radius: 6px;
    margin-left: -10px;
  }
  .detail-back button:hover { background: var(--bg-alt); color: var(--text); }
  .detail-body {
    padding: 32px 24px 60px;
  }
  .detail-meta {
    font-size: 12.5px;
    color: var(--text-sub);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 28px;
    line-height: 1.4;
    margin: 0 0 18px;
    letter-spacing: 0.008em;
  }
  .detail-thumb {
    width: 100%;
    border-radius: var(--radius-lg);
    margin: 0 0 24px;
    background: var(--bg-alt);
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }
  .detail-summary {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text);
    margin: 0 0 28px;
  }
  .why {
    background: var(--bg-alt);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 var(--radius) var(--radius) 0;
    margin: 0 0 32px;
  }
  .why-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .why-text {
    font-size: 14px;
    color: var(--text);
    margin: 0;
    line-height: 1.65;
  }
  .topics {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin: 0 0 28px;
  }
  .topic {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-sub);
    background: var(--bg-alt);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .btn {
    font-size: 13.5px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--border-hover);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn:hover { background: var(--bg-alt); }
  .btn-primary {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .btn-primary:hover { background: #000; border-color: #000; }
  .btn-like.is-liked {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(44,182,150,0.06);
  }

  /* ============ CATEGORY CHIPS ============ */
  .chip-row-wrap {
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .chip-row-wrap::-webkit-scrollbar { display: none; }
  .chip-row {
    display: flex;
    gap: 8px;
    padding: 4px 0 16px;
    white-space: nowrap;
  }
  .chip {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text-sub);
    background: var(--bg-alt);
    padding: 7px 14px;
    border-radius: 999px;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .chip:hover { background: #f0f0f0; color: var(--text); }
  .chip.is-active {
    background: var(--text);
    color: #fff;
  }
  .chip .chip-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .chip .chip-count {
    font-size: 11.5px;
    opacity: 0.7;
    font-weight: 500;
  }

  /* ============ CARD CATEGORY LABEL ============ */
  .card-cat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-sub);
  }
  .card-cat .cat-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  /* ============ BOTTOM SHEET ============ */
  .sheet {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
  }
  .sheet.is-open { display: block; }
  .sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.38);
    animation: sheet-fade 0.2s ease;
  }
  .sheet-panel {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    padding: 10px 18px 24px;
    max-width: var(--max);
    margin: 0 auto;
    animation: sheet-slide 0.24s cubic-bezier(.22,1,.36,1);
    max-height: 80vh;
    overflow-y: auto;
  }
  @keyframes sheet-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheet-slide { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #d9d9d9;
    border-radius: 999px;
    margin: 0 auto 12px;
  }
  .sheet-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 17px;
    margin: 6px 4px 16px;
    color: var(--text);
  }
  .sheet-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .sheet-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 14px;
    background: var(--bg-alt);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.15s;
    border: 1.5px solid transparent;
    text-align: left;
    width: 100%;
  }
  .sheet-opt:hover { background: #f2f2f2; }
  .sheet-opt.is-current {
    background: rgba(44,182,150,0.08);
    border-color: var(--accent);
  }
  .sheet-opt .opt-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .sheet-opt .opt-check {
    margin-left: auto;
    color: var(--accent);
    font-size: 16px;
    display: none;
  }
  .sheet-opt.is-current .opt-check { display: inline; }
  .sheet-action {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    margin-top: 6px;
    transition: background 0.15s;
  }
  .sheet-remove {
    color: #d14a4a;
    background: rgba(209,74,74,0.06);
  }
  .sheet-remove:hover { background: rgba(209,74,74,0.12); }
  .sheet-cancel {
    color: var(--text-sub);
    background: transparent;
  }
  .sheet-cancel:hover { background: var(--bg-alt); }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 560px) {
    .intro { margin-top: 24px; }
    .intro h1 { font-size: 22px; }
    .card-inner {
      grid-template-columns: 1fr 84px;
      gap: 14px;
    }
    .card-thumb { width: 84px; height: 84px; }
    .card-title { font-size: 15.5px; }
    .detail-body { padding: 24px 18px 48px; }
    .detail-title { font-size: 22px; }
    .sheet-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="site-title"><span class="dot"></span>Urban Design Daily</div>
    <nav class="tabs">
      <button class="tab is-active" data-tab="all">All</button>
      <button class="tab" data-tab="saved">Saved<span class="badge" id="saved-badge"></span></button>
    </nav>
  </div>
</header>

<section class="intro" id="intro">
  <h1>Today in city-making.</h1>
  <p id="intro-subtitle">English-language urban design news, filed daily at 9am.</p>
</section>

<div class="chip-row-wrap" id="chip-row-wrap" style="display:none;">
  <div class="chip-row" id="chip-row"></div>
</div>

<main class="feed" id="feed"></main>

<div class="sheet" id="sheet" aria-hidden="true">
  <div class="sheet-backdrop" data-sheet-close></div>
  <div class="sheet-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title">Save to...</div>
    <div class="sheet-options" id="sheet-options"></div>
    <button class="sheet-action sheet-remove" id="sheet-remove" style="display:none;">Remove from saved</button>
    <button class="sheet-action sheet-cancel" data-sheet-close>Cancel</button>
  </div>
</div>

      "url": "https://architectureau.com/articles/new-10-year-plan-for-perth-city-unveiled/",
      "thumbnail": "https://media3.architecturemedia.net/site_media/media/cache/72/b5/72b584e7875877cbd683b1291806ab4c.jpg",
      "summary": "The City of Perth has endorsed Shaping Perth City Centre – Towards 2036 and Beyond, a ten-year strategic framework developed with Danish urban strategy firm Gehl Architects, extending what is now a 30-year collaboration between the two. The plan sets five strategic goals and 20 implementation directions and identifies five catalytic Key Moves intended to act as the spine of the next decade of investment: North-South Connectors, the Buneenboro Loop, Living Streets, The Malls Evolution, and East-West Transit Corridors. The Buneenboro Loop, named with the Noongar term for the Swan River, is a continuous waterfront walking and cycling route stitching Derbarl Yerrigan, Kaarta Gar-up (Kings Park), the Perth Convention and Exhibition Centre, Elizabeth Quay and Langley Park into a single legible public realm. William Street is earmarked to become a living street – a green, walkable, bike-friendly spine with reduced through-traffic, dining edges and activated ground floors – while Barrack Street is reframed as a cultural axis. A new People's Walk would connect Central Perth Station to Forrest Place, Carillon City and Elizabeth Quay, knitting the station forecourt to the river. The framework was developed with more than 80 stakeholders from private industry and government, and is pegged to a demographic target of 55,000 residents in the city centre by 2036 and up to 90,000 by 2050 – roughly doubling to tripling the current population. The Malls Evolution direction revisits Murray and Hay Street Malls as primary retail anchors needing curated programming, evening activation and a resilient tenancy mix to survive shifts in office attendance and online retail.",
      "whyItMatters": "Indigenous-named waterfront loop plus a William Street 'living street' is a template Melbourne could port onto Elizabeth Street or the Yarra edge.",
      "topics": [
        "Australia",
        "Public Space",
        "Streetscape",
        "Placemaking"
      ]

      "id": "2026-04-23-002",
      "date": "2026-04-23",
      "title": "NYC announces new 'pied-a-terre tax' on second homes",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137381-nyc-announces-new-pied-terre-tax-second-homes",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_732369841.jpg",
      "summary": "Mayor Zohran Mamdani and Governor Kathy Hochul announced on 15 April a joint proposal for New York's first pied-a-terre tax, an annual surcharge on one-to-three family homes, condominiums and co-ops valued above US$5 million when the owner's primary residence sits outside New York City. The city estimates roughly 13,000 properties would be affected and projects the tax would raise at least US$500 million a year – revenue the mayor argues will help close the city's spending deficit and fund housing, transit and public-service priorities. Polling cited by the mayor's office put support among New Yorkers at 93 percent, while the real estate lobby has pushed back hard, warning the surcharge would depress property values, deter investment and cut construction jobs. The measure still needs to pass the New York State Legislature, where similar proposals have stalled before. For urban designers, the proposal matters less as a tax story than as a signal about the city's posture toward housing that sits empty most of the year. Shadow-city anxieties – lights-off condo towers along 57th Street's Billionaires' Row – have shaped debate for over a decade, but this is the first time a sitting mayor and governor have formally aligned behind pricing the external cost of that absenteeism. The policy does not, by itself, return those units to resident use, but it reframes ultra-luxury second homes as a drain on the tax base rather than a civic trophy, and makes land-value capture at the top of the market politically live again.",
      "whyItMatters": "Live test of whether taxing vacant luxury housing nudges supply – a question Melbourne also faces with its vacant residential land tax and absentee-owner surcharge.",
      "topics": [
        "US",
        "Housing",
        "Policy",
        "Zoning"
      ]

      "id": "2026-04-23-003",
      "date": "2026-04-23",
      "title": "Reclaiming the Street: Alejandra Ferrera on Architecture and Urban Life in Honduras",
      "source": "ArchDaily",
      "url": "https://www.archdaily.com/1039699/reclaiming-the-street-alejandra-ferrera-on-architecture-and-urban-life-in-honduras",
      "thumbnail": "https://images.adsttc.com/media/images/69e1/4dfd/63f5/ef01/884f/dbb7/large_jpg/high-quality-urban-design-in-honduras-bridging-local-and-international-architecture-through-the-lens-of-alejandra-ferrera-architecture_15.jpg?1776373287",
      "summary": "Honduran architect Alejandra Ferrera argues in a long ArchDaily interview that decades of security-driven design have hollowed out the public realm in Tegucigalpa and other Honduran cities, reducing the street to a transit void rather than a place of social encounter. Raised in Danli and trained across Brazil, the Netherlands and Australia, Ferrera brings fifteen years of comparative practice to the diagnosis. The shift she traces is familiar across much of Latin America: high perimeter walls, gated compounds, privatised amenities, and a retreat of middle-class domestic life from the sidewalk inward. Ferrera accepts that fear was a reasonable response to real crime in the 1990s and 2000s, but argues the city never rebuilt the connective tissue that walls replaced – porous ground floors, shaded seating, legible public frontages, small commerce along the kerb. The consequence, she argues, is a wounded national identity that instinctively looks to Miami or Madrid for design references and dismisses the ordinary fabric of Honduran barrios as backdrop rather than raw material. Her own practice sits in explicit opposition: projects that re-privilege the street, reuse local timber and masonry, and treat vernacular typologies as design intelligence rather than nostalgia. Ferrera points to heritage-led work in Comayagua and incremental public-space repairs in Tegucigalpa as evidence the pattern can be reversed, and calls on younger Honduran practices to stop treating security and good public space as a tradeoff. The piece lands as several Latin American cities openly reposition public safety as an urban-design outcome rather than a security-forces one.",
      "whyItMatters": "Hard counter to defensive design: reminds designers that active frontage and eyes-on-the-street are a safety strategy, not just amenity.",
      "topics": [
        "Public Space",
        "Placemaking",
        "Streetscape",
        "Heritage"
      ]

      "id": "2026-04-22-001",
      "date": "2026-04-22",
      "title": "25-year masterplan unveiled to transform Sydney Olympic Park",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/25-year-masterplan-unveiled-to-transform-Sydney-Olympic-Park/",
      "thumbnail": "https://media4.architecturemedia.net/site_media/media/cache/b5/52/b552ca2ec9e13246d07e6810861f9def.jpg",
      "summary": "The New South Wales government has finalised the Sydney Olympic Park Master Plan 2050, a 25-year blueprint to convert the 640-hectare former Games precinct into a mixed-use urban neighbourhood for 15,000 new homes alongside its existing sporting and entertainment functions. Launched on 1 April 2026, the plan was designed by SJB with landscape architects Turf Design Studio and Indigenous design practice Yerrabingin, supported by SGS Economic and Planning, Cred Consulting, Atelier 10 and WSP. It builds on a draft exhibited in October 2024, with the finalised document adding 2,000 homes beyond the draft's figure. Up to 20 percent of dwellings on government-owned land and 5 percent on private land will be affordable. The masterplan protects and enhances 430 hectares of public open space and layers in 10 new playgrounds, nine new outdoor public spaces and four new sports fields. A new innovation, culture and commercial precinct will sit alongside a cultural centre, a library and community hub, and a sports and leisure centre, pivoting the park from event-day monoculture toward weekday civic life. Tree canopy and biodiversity across the existing wetlands and parklands will be expanded. The plan is pegged to major transport investments including Sydney Metro West and the Parramatta Light Rail extension, with dense pedestrian and cycling networks woven through the precinct. The Homebush Bay Drive roundabout upgrade, jointly state and federally funded, underpins the road network. Together, the moves reposition Olympic Park from a special-purpose venue to a transit-oriented, mixed-use district anchored by stadiums and green infrastructure.",
      "whyItMatters": "A precedent for retrofitting event-dominated, special-purpose precincts into transit-oriented, mixed-use neighbourhoods with affordable housing baked in.",
      "topics": [
        "Australia",
        "Housing",
        "Transit",
        "Public Space"
      ]

      "id": "2026-04-22-002",
      "date": "2026-04-22",
      "title": "Coldefy leads winning masterplan to transform Budapest brownfield into rewilded urban district",
      "source": "ArchDaily",
      "url": "https://www.archdaily.com/1040337/coldefy-leads-winning-masterplan-to-transform-budapest-brownfield-into-rewilded-urban-district",
      "thumbnail": "https://images.adsttc.com/media/images/69ce/ef7d/7950/3001/88e7/fd45/large_jpg/coldefy-led-team-wins-rakosrendezo-masterplan-competition-in-budapest_5.jpg?1775169461",
      "summary": "French architecture practice Coldefy, leading a team that includes CITYFÖRSTER, Sporaarchitects, TREIBHAUS.LAND and Marko & Placemakers, has won the competition to design a masterplan for Rákosrendező, a long-derelict railway-yard site on Budapest's eastern edge that the city has called its rust belt. The 15-year scheme stitches over 10,000 apartments, commercial and civic programme, and a new multimodal transport hub onto the contaminated brownfield, with the existing Rákosrendező station reimagined as the heart of the precinct and linked to an extended metro line, a new tram line and a network of active mobility routes. Six sub-districts, each with its own character, are threaded together by a continuous loop of public space aligned with 15-minute city principles. The landscape strategy treats ecology as primary infrastructure: a 15-hectare Forest Park anchors the site, connected via linear parks to a new Railway Park that incorporates meadows, event spaces and a central lake. The Rákos Stream, previously channelised, is renaturalised as a meandering waterway with accessible terraces, paths and rest areas along its reshaped banks. Blue and green systems are explicitly combined to form a continuous ecological corridor through the district. The jury praised the scheme for a livable residential environment and the exceptional quality of its public space system. The design team positions rewilding as a generator of public life rather than a decorative overlay, with parks structured to activate the six new neighbourhoods. The project offers a European precedent for converting obsolete rail infrastructure into transit-oriented, ecologically driven urban fabric at scale.",
      "whyItMatters": "A template for turning contaminated rail yards into 15-minute, transit-anchored districts where rewilded landscape does the structural work, not decoration.",

        "Europe",
        "Placemaking",
        "Public Space",
        "Climate"

      "id": "2026-04-22-003",
      "date": "2026-04-22",
      "title": "Philadelphia gained 4,000 new housing permits per year after upzoning",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137386-philadelphia-gained-4000-new-housing-permits-year-after-upzoning",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_2572251603.jpg",
      "summary": "A new Urban Institute study analysed 15 years of zoning changes in New York City and Philadelphia and found that broad upzoning reforms measurably increased housing supply, though with substantial variation across neighbourhoods. In Philadelphia, citywide upzoning helped generate as many as 4,000 additional housing unit permits per year compared with non-upzoned parcels, with the strongest effect appearing between 2019 and 2021. In New York, seven neighbourhood-scale upzonings collectively produced more than 4,000 additional housing units within four years beyond the counterfactual. Reporting on the study for Planetizen, Diana Ionescu highlights the finding that both cities saw significant supply gains from rezoning, but not uniformly. Upzoned parcels in areas with pre-existing weaker housing markets saw little uplift in permitting or completions; the neighbourhoods that captured the bulk of new development were already attracting investment before the rezoning. The researchers argue this confirms zoning reform is necessary but insufficient on its own, and that permits do not automatically translate into built units. The policy takeaway is that upzoning needs to be paired with complementary interventions such as infrastructure, subsidy, demand-side support and with direct affordability and anti-displacement measures, particularly in hot-market areas where supply gains risk concentrating where they are least needed for relative affordability. The study adds empirical weight to the emerging consensus that the supply-alone narrative overstates what zoning reform can deliver, while also confirming that upzoning does move the needle on permits at a scale large enough to matter for citywide housing policy.",
      "whyItMatters": "Upzoning produces permits but not uniformly — pair it with investment and anti-displacement levers, or the supply gains cluster in already-hot submarkets.",
      "topics": [
        "US",
        "Housing",
        "Zoning",
        "Policy"
      ]

      "id": "2026-04-21-001",
      "date": "2026-04-21",
      "title": "Winners revealed: Australian Urban Design Awards 2026",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/winners-revealed-2026-australian-urban-design-awards/",
      "thumbnail": "https://media4.architecturemedia.net/site_media/media/cache/d9/b6/d9b61b771477298cc26affbd93c3c808.jpg",
      "summary": "The 2026 Australian Urban Design Awards were unveiled in Canberra, recognising twelve winners across nine projects and three individuals selected from a 27-project shortlist. The Built Outcomes category — the core recognition for realised civic work — delivered three winners that collectively map the current range of Australian urban design practice. Melbourne's St Kilda Pier Redevelopment, delivered by Jackson Clements Burrows Architects with Site Office Landscape Architecture and AW Maritime, was described by the jury as a major piece of civic engineering that is both resilient and whimsical, acknowledging a project that rebuilt a climate-exposed bayside pier as a continuous piece of public infrastructure rather than a nostalgic restoration. Alongside it, Balam Balam Place in Brunswick by Kennedy Nolan with Open Work and Finding Infinity was recognised as a socially inclusive civic precinct developed through a sensitive approach to the renewal of existing heritage fabric — heritage-led urbanism treated as live infrastructure rather than museum practice. The third Built Outcomes winner, Campbelltown Station Commuter Carpark in Sydney by Hill Thalis Architecture and Urban Projects, reconceived a purely utilitarian building type as enduring civic infrastructure animated by colour and planting, signalling the jury's interest in dignifying the everyday pieces of the transit network rather than reserving design attention for marquee stations. Read together, the three winners suggest the awards are rewarding projects that reframe infrastructure — a pier, a heritage precinct, a park-and-ride — as long-life civic assets with visible landscape and social programming.",
      "whyItMatters": "Three infrastructure types — pier, heritage precinct, commuter carpark — reframed as civic assets. Design discipline now applies to the everyday pieces too.",
      "topics": [
        "Melbourne",
        "Australia",
        "Public Space",
        "Heritage"
      ]
    },

      "id": "2026-04-21-002",
      "date": "2026-04-21",
      "title": "Chicago eliminates parking requirements near transit",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137368-chicago-eliminates-parking-requirements-near-transit",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_1091570147.jpg",
      "summary": "Chicago has fully eliminated minimum parking requirements for new housing within walking distance of Chicago Transit Authority rail stations, Metra stations and high-frequency bus corridors, completing a two-stage reform that now aligns the city with the incoming Illinois People Over Parking Act. The local ordinance builds on the 2022 Connected Communities Ordinance, which halved parking minimums in transit-served areas and allowed zero parking for assisted or affordable projects, and a 2025 amendment that let developments outside downtown provide zero parking without administrative adjustment. The latest change is the clean version: no minimum, no case-by-case ask. Paired with the reform, the city expanded by-right accessory dwelling units to all multifamily residential districts, meaning zoning now pulls in the same direction rather than creating a workaround. The state law, the People Over Parking Act, takes effect 1 June 2026 and prohibits any Illinois municipality from imposing minimum automobile parking on projects within half a mile of a transit hub or an eighth of a mile of a transit corridor, with hotels and motels carved out. Researchers cited in the coverage estimate surface parking spaces add more than 4,000 dollars per unit to construction costs and structured spaces more than 37,000 dollars, costs that have historically flowed through to rent — roughly a 17 percent premium in some studies. For practitioners, the reform consolidates a template: eliminate minimums, pair with ADU liberalisation, and let the housing rather than the car define block-scale form.",
      "whyItMatters": "Illinois becomes the fourth US state to end transit-area parking minimums. The template — end minimums, pair with ADU liberalisation — is ready to adapt.",
      "topics": [
        "US",
        "Zoning",
        "Transit",
        "Housing"
      ]
    },
    {
      "id": "2026-04-21-003",
      "date": "2026-04-21",
      "title": "Atlanta's Beltline hits 79% of its affordable housing goal",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137289-atlantas-beltline-hits-79-its-affordable-housing-goal",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_2466603261.jpg",
      "summary": "Atlanta Beltline, Inc. has announced it is at 79 percent of its 2030 affordable housing target, reporting 4,425 affordable or preserved units delivered inside the Beltline Tax Allocation District against a goal of 5,600 units. The progress reframes a project that was flagged in earlier years as falling behind: the agency delivered 299 units in 2025 and is projecting another 300 to 500 per year through the late 2020s, with a live pipeline of roughly 500 units currently in active development. Three projects carry the near-term weight. 579 Garson Drive, expected to close in the second quarter of 2026, will deliver 130 permanently affordable homes alongside 8,000 square feet of commercial space. 350 Chappell Road, a 6.3-acre site targeting 218 affordable units at 30 to 80 percent area median income, is scheduled to close this year. Waterworks opened in December 2025 with 100 studio apartments structured as rapid housing for formerly unhoused residents. The Beltline is also running a displacement prevention program that subsidises property-tax increases for long-time residents through 2030 — an explicit acknowledgement that the greenway has generated value uplift that falls on the people it was meant to serve. A new Affordable Housing Dashboard launched in January 2026 maps each delivered development and its affordability band, making the 4,425-unit figure independently auditable. For designers, the lesson is that a linear greenway functions as land policy: the trail programs the zone of uplift, and the housing target plus dashboard are how that uplift is captured.",
      "whyItMatters": "The trail creates the uplift; the affordable housing target and dashboard decide who keeps it. A loop Melbourne's greenway corridors will eventually need.",
      "topics": [
        "US",
        "Housing",
        "Placemaking",
        "Policy"
      ]
    },
    {
      "id": "2026-04-20-001",
      "date": "2026-04-20",
      "title": "NSW government proposes single statewide community consultation framework",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/NSW-government-releases-draft-plan-to-introduce-single-statewide-consultation-framework/",
      "thumbnail": "https://media2.architecturemedia.net/site_media/media/cache/4e/98/4e98d8c162a259a696140ee7435c11fd.jpg",
      "summary": "The NSW government has released a draft statewide Community Participation Plan that would replace more than 100 separate local plans with a single, consistent process for how the public is consulted on planning proposals across the state. The draft, released on 8 April by the Minns Labor government, addresses what the planning department describes as \"inconsistent consultation practices and confusion\" — a patchwork where timeframes, notification thresholds and exhibition requirements vary between councils, leaving residents, practitioners and applicants unsure how to engage. Under the draft, minimum consultation periods for significant state-level strategic planning initiatives extend from 45 to 60 days, reflecting an argument that strategic plans — the instruments that actually shape precincts and metropolitan structure — deserve more scrutiny, not less. Notification of complying development is standardised with a mandatory seven-day notice to neighbours before works begin. In a deliberate trade-off, councils will no longer need to publicly exhibit low-impact rules-compliant applications like houses on compliant lots, sheds and pools, speeding up assessment by removing exhibition overhead on applications where there is nothing meaningful to consult on. The draft preserves councils' ability to adapt their own engagement strategies to local circumstances, meaning place-specific processes can still sit over the top of the standardised base layer. Peak development bodies have welcomed the move as reducing the overhead of operating across multiple LGAs; local government associations have pushed back on aspects that narrow council discretion. The draft and accompanying discussion paper are on public exhibition until 3 June 2026 through the NSW Planning Portal, with submissions open to individuals, councils, industry bodies and community groups.",
      "whyItMatters": "Consultation frameworks are urban design infrastructure. Who gets consulted on which strategic plans shapes what precincts become — a live precedent as Plan Melbourne's next refresh looms.",
      "topics": [
        "Australia",
        "Policy",
        "Planning Reform"
      ]
    },
    {
      "id": "2026-04-20-002",
      "date": "2026-04-20",
      "title": "Maryland unveils plan for 5,000 homes near Baltimore transit stations",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137321-maryland-unveils-plan-5000-homes-near-transit",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_2526395807.jpg",
      "summary": "Maryland Governor Wes Moore and Baltimore Mayor Brandon Scott have unveiled the Baltimore Regional Transit-Oriented Development Strategy, a plan to activate 134 acres of state-owned land near Baltimore metro and light rail stations for roughly 5,000 new homes. The sites — most currently operating as surface parking lots spread across 17 stations in Baltimore City and Anne Arundel and Baltimore counties — are explicitly targeted because they are already publicly owned, already adjacent to high-capacity transit, and already producing minimal public value as asphalt. The state projects about 1.4 billion dollars in added state and local tax revenue over the life of the program. The first site moving to market is roughly nine acres surrounding the Rogers Avenue Metro Station in northwest Baltimore, where the state is seeking a development partner to deliver up to 400 homes, projected to generate about 27 million dollars in state and city tax revenue from that parcel alone. Mayor Scott framed the parking-lot-to-housing swap explicitly in urban design terms: reducing the need for people to drive to the station weakens the case for large park-and-ride footprints and lets the station precinct be rebuilt as a walkable neighbourhood. Moore paired the announcement with broader transit investment, including 78 new rail cars scheduled by 2027, and flagged a Maryland Transit and Housing Opportunity Act that would unlock more than 300 acres of state-owned land adjacent to existing transit stations. For designers, the precedent is the combination of an enabling law, a pre-identified portfolio of state-owned land, and a concrete first pipeline project released simultaneously — a delivery package rather than aspirational policy.",
      "whyItMatters": "Surface parking at transit stations is latent public land. Releasing it as a packaged pipeline, not site-by-site, is the delivery pattern Plan Melbourne's activity centres need.",
      "topics": [
        "US",
        "Transit",
        "Housing",
        "Policy"
      ]
    },
    {
      "id": "2026-04-20-003",
      "date": "2026-04-20",
      "title": "Elevated Infrastructure and Public Space: Reclaiming the Ground Below",
      "source": "ArchDaily",
      "url": "https://www.archdaily.com/1040374/elevated-infrastructure-and-public-space-reclaiming-the-ground-below",
      "thumbnail": "https://images.adsttc.com/media/images/69d8/0752/d510/7401/89af/d46b/large_jpg/elevated-infrastructure-and-public-space-reclaiming-the-ground-below_21.jpg?1775765342",
      "summary": "ArchDaily's latest editorial essay examines how cities are reclaiming the ambiguous spaces beneath elevated infrastructure — highway flyovers, metro viaducts, rail bridges — as intentional public realm rather than as leftover shade. The piece's framing is structural: elevation reorganises the city vertically, letting speed, capital and visibility flow above while producing a shaded, fragmented second ground below that rarely receives the same design attention as the structures above. Where that second ground is neglected, it becomes the residue of infrastructure — unprogrammed, often hostile, and culturally coded as abandoned. Where it is designed with the rigour of a plaza or park, it becomes a continuous civic landscape. The article draws on case studies including the Bentway Staging Grounds in Toronto, where the undercroft of the Gardiner Expressway has been reworked through lighting, flexible ground treatments and seasonal programming into a programmable public stage; Miyashita Park in Tokyo, an early prototype of re-engineering elevated rail fabric as park-over-rail; and the Taichung Green Corridor in Taiwan, where a former railway alignment has been rebuilt as a continuous public spine integrating landscape, mobility and social infrastructure. The recurring design lesson the piece distils is that reclaiming under-infrastructure space demands continuity — of lighting, of ground plane, of program — rather than site-by-site intervention. It also argues these spaces are uniquely valuable as climate infrastructure: already shaded, already cool, already connected to transit. For dense cities running out of available ground for parks, the space under viaducts reads as the last accessible reserve of civic space, and the precedents are now mature enough to adapt rather than reinvent.",
      "whyItMatters": "Melbourne's West Gate and CityLink edges are the local equivalent — underused civic reserve in plain sight. Continuity of ground plane is the design move to steal.",
      "topics": [
        "Public Space",
        "Streetscape",
        "Climate"
      ]
    },
    {
      "id": "2026-04-19-001",
      "date": "2026-04-19",
      "title": "Country-centred urban design scheme wins 2026 AA Prize for Unbuilt Work",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/country-centred-urban-design-scheme-wins-2026-aa-prize-for-unbuilt-work/",
      "thumbnail": "https://media4.architecturemedia.net/site_media/media/cache/d8/35/d835345be4112d747948c14df99cba7a.png",
      "summary": "Whadjuk Balardong Elder Robyn Collard and architect Simon Pendal have won the 2026 AA Prize for Unbuilt Work with \"Walyalup/Fremantle — What If,\" a speculative scheme that reimagines Fremantle's planning code through a Country-centred lens. Rather than redesign individual sites, the project proposes structural changes to local planning controls: a network of \"garden archipelagos\" — connected green spaces that thread through the city by linking yards, schoolyards, sports grounds, golf courses, mature reserves and natural bush — paired with discreet building density bonuses concentrated at the edges of each lot. The combination is calibrated to bring back Country across the metropolitan grain without the broad-brush demolition that traditional urban renewal demands. The submission positions Fremantle as a test case for what Pendal calls \"layering new uses without subtraction\": existing fabric is preserved, gardens and small businesses are folded into the same blocks as new homes, and pedestrian and ecological connections are formalised through code rather than negotiated case by case. Density bonuses act as the regulatory carrot; ecological connectivity is the binding rule that organises growth. The 2026 jury — Ingrid Bakker (Hassell), Kirsteen Mackay (Office for Design and Architecture SA), Deo Prasad (UNSW), Stuart Vokes (Vokes and Peters), and chair Georgia Birks (Architecture Australia) — singled out the project for translating Indigenous-led thinking into operational planning instruments rather than rhetoric. For Australian designers used to seeing Country acknowledgement as a project add-on, the win signals a serious appetite for embedding it inside the zoning code itself.",
      "whyItMatters": "Country-led planning is finally being operationalised as zoning code, not just cultural protocol — density bonuses become the carrot, ecological connectivity the rule.",
      "topics": [
        "Australia",
        "Indigenous-led",
        "Planning Reform"
      ]
    },
    {
      "id": "2026-04-19-002",
      "date": "2026-04-19",
      "title": "Reimagining the Complete Neighborhood through Urban Renaturing",
      "source": "ArchDaily",
      "url": "https://www.archdaily.com/1040595/reimagining-the-complete-neighborhood-through-urban-renaturing",
      "thumbnail": "https://images.adsttc.com/media/images/69dc/c70f/adbb/f701/8b64/536e/large_jpg/reimagining-the-complete-neighborhood-through-urban-renature_1.jpg?1776076572",
      "summary": "ArchDaily contributor Olivia Poston profiles ReGreeneration, a transnational European consortium led by C40 Cities and supported by ARUP, Placemaking Europe, Climato Sfera and Inetum, that operates explicitly at the intersection of urban ecology, public health, infrastructure and neighborhood-scale design. The project is funded under Horizon Europe — the EU's research and innovation programme launched in 2021 with a 95 billion euro commitment — and unites nine cities, their governing bodies, and leading research institutions in a coordinated effort to rebuild European neighbourhoods around climate resilience. The article's premise is structural: rather than treating greening as urban beautification or stormwater infrastructure as an engineering problem, ReGreeneration argues that European cities must fundamentally change how they are built and maintained if they are to remain liveable under accelerating climate pressure. The \"complete neighbourhood\" concept — usually used in North American planning to describe walkable, mixed-use districts with daily needs in proximity — is here recast through an ecological lens, with renaturing (the deliberate restoration of soil, hydrology, canopy and biodiversity into built fabric) treated as a foundational service alongside transport and housing. The piece collects case studies from participating cities, sketching how neighbourhood-scale interventions are being prototyped: depaved courtyards, rerouted stormwater, microforest plantings, cooling corridors, building retrofits. For practitioners outside Europe, the project is a useful precedent for how a public funder can underwrite the slow, expensive work of structural ecological retrofit at a scale individual councils rarely manage.",
      "whyItMatters": "\"Complete neighbourhood\" is usually a transport/retail idea. Folding ecological renaturing into it — funded at EU scale — genuinely shifts the term's meaning.",
      "topics": [
        "Europe",
        "Climate",
        "Public Space"
      ]
    },
    {
      "id": "2026-04-19-003",
      "date": "2026-04-19",
      "title": "Melbourne Design Week 2026: 400+ events mark the decade",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/melbourne-design-week-2026-announced/",
      "thumbnail": "https://media2.architecturemedia.net/site_media/media/cache/4b/c9/4bc9159e18a1687d9671e23e6bba99d9.jpg",
      "summary": "Melbourne Design Week 2026 returns 14–24 May for its tenth anniversary edition with more than 400 events spanning architecture, interiors, product design and emerging cross-disciplinary practice — the largest program the festival has staged. The decade marker positions Melbourne's design culture as a confident export rather than a regional showcase, with international visitors expected across a slate that includes exhibitions, symposia, studio openings, walking tours, and on-site previews of projects in construction. The Queen Victoria Market precinct emerges as a recurring centre of gravity. Cox Architecture's recently announced scheme — more than 1,500 dwellings opposite the soon-to-be-built Gurrowa Place development — sits at the western edge of the market and is one of several projects MDW is using to anchor conversation about the future of central Melbourne's residential mix. Several program threads engage directly with QV Market's redevelopment, treating it as a live brief rather than a finished case study, with curated walks and roundtables built around the precinct's evolving public realm. Other strands cover circularity in product design, Indigenous-led design practice, and the emerging cohort of practice models being incubated through RMIT, Monash and Melbourne University design schools. The decade-long arc of MDW also lets the festival reflect on its own format — a number of sessions will examine whether the city-as-festival model still serves a profession increasingly distributed across hybrid and remote work. Full program drops late April; bookings open shortly after.",
      "whyItMatters": "QV Market is now the de facto centre of gravity for Melbourne's next decade of urban thinking. Watch what gets programmed there over the festival's ten days.",
      "topics": [
        "Melbourne",
        "Events",
        "Mixed-use"
      ]
    },

      "id": "2026-04-18-001",
      "date": "2026-04-18",
      "title": "Melbourne group resurrects dormant Urban Design Forum",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/urban-design-forum/",
      "thumbnail": "https://media5.architecturemedia.net/site_media/media/cache/f5/39/f539f958a879aa0150f9e929cd897ebe.jpg",
      "summary": "A group of Melbourne practitioners has relaunched the Urban Design Forum (UDF), reviving a more than 30-year-old organisation that had gone dormant during the pandemic. The reboot — formally announced at MPavilion — aims to galvanise like-minded peers around the major challenges facing Australian cities, with a stated mission to support \"the design and governance of the city in the public interest\" with a renewed sense of ambition. The relaunch fills a recognisable gap in the Melbourne discourse. Australian urban design currently runs through professional peak bodies (AILA, AIA, PIA), academic conferences and individual practice events, but lacks a forum dedicated specifically to urban design — distinct from architecture or planning — at the metropolitan scale. The UDF revival positions itself as that connective tissue: a space for cross-disciplinary debate among urban designers, landscape architects, planners, transport engineers and city-makers from local government. Programming will include public forums, members-only roundtables, research fellowships and an advocacy stream targeting state policy. Early sessions are framed around metropolitan-scale questions — the next refresh of Plan Melbourne, the role of public land in housing supply, density done well, and the governance gaps in growth-area councils — that the founders argue have lacked an organised professional voice. The committee includes practitioners drawn from large multidisciplinary firms, sole-practice studios, academia and local government, deliberately spanning generations. Subscriptions and event signups are now open through udf.org.au.",
      "whyItMatters": "Professional forums shape what cities ask for. A revived UDF changes whose voices get into Plan Melbourne's next refresh — and how loud they are.",
      "topics": [
        "Melbourne",
        "Advocacy",
        "Policy"
      ]

      "id": "2026-04-18-002",
      "date": "2026-04-18",
      "title": "University of Michigan launches one-year Master of Urban Technology",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137332-university-michigan-launches-urban-technology-masters-program",
      "thumbnail": "https://www.planetizen.com/files/images/MPHOTO-UMCI_GndBk_gal03-1536x1024.jpg",
      "summary": "The University of Michigan's Taubman College of Architecture and Urban Planning will launch a one-year Master of Urban Technology degree — the first programme of its kind that can be completed in a single year at a US university. The new degree positions itself between traditional urban planning and computer science, targeting an emerging professional space defined by civic data, smart mobility, sensor networks, and neighborhood-scale digital infrastructure. The structure — accelerated, post-graduate, professionally oriented — signals a maturation of the urban-tech field, which until now has typically been pursued through graduate certificates inside planning faculties or specialised tracks within information schools. Taubman's programme commits a full year of dedicated coursework to the discipline, suggesting employer demand has reached the point where a standalone credential is viable. Course content will cover civic data infrastructure, urban analytics, mobility systems, public-sector digital procurement, and the ethics of automated decision-making in city services. Studio work pairs students with municipal partners on live projects — a model adapted from Taubman's existing planning studios. Graduates are positioned for hybrid roles in city governments, transit agencies, large engineering consultancies, and the emerging cohort of urban-tech vendors building everything from kerbside sensors to congestion-pricing systems. For practitioners watching this space, the launch is a useful signal: urban tech is consolidating from a sub-specialty into its own recognised discipline, and the credentialing infrastructure is starting to catch up. First intake opens in autumn.",
      "whyItMatters": "Urban tech is consolidating from a sub-specialty into its own discipline. Watch the credentialing infrastructure — that's where the field's centre of gravity moves next.",
      "topics": [

        "Education",
        "Urban Tech"
      ]

      "id": "2026-04-25-001",
      "date": "2026-04-25",
      "title": "New reforms legislated for Victorian apartment buildings",
      "source": "ArchitectureAU",
      "url": "https://architectureau.com/articles/new-reforms-legislated-for-victorian-apartment-buildings/",
      "thumbnail": "https://media3.architecturemedia.net/site_media/media/cache/65/e8/65e8475f881dc2c2c5f6d71333b8c301.jpg",
      "summary": "Victoria's new Mid-Rise Code commenced operation on 16 April 2026, introducing deemed-to-comply planning standards for apartment buildings between four and six storeys in designated residential zones. Under the reform, developments that meet state-wide requirements are automatically compliant, with no standing for neighbours to appeal — a significant streamlining of an approval process long criticised as one of the slowest in the country. Clause 57 applies the rules to the Mixed Use Zone, the Township Zone inside Melbourne's urban growth boundary, the Residential Growth Zone, and the new Housing Choice and Transport Zone. The code abolishes the mandatory upper-level setback that produced the so-called \"wedding cake\" silhouette across inner Melbourne, freeing designers to pursue simpler massing with better thermal performance. It also introduces tree canopy targets of 10–20 per cent on site, alongside new standards for privacy, daylight and communal open space. Heritage and flood overlays continue to operate in parallel, so character precincts are not automatically opened up. Premier Jacinta Allan framed the code as a delivery mechanism for \"more homes, faster, in the places people want to live,\" and the package is pitched to absorb a meaningful share of Melbourne's mid-rise pipeline, where the \"missing middle\" has historically been trapped between townhouse codes and tower controls. Industry bodies have broadly welcomed the certainty while warning that apartment quality will hinge on how rigorously the landscape and daylight standards are enforced under deemed-to-comply pathways.",
      "whyItMatters": "For urban designers, the Mid-Rise Code reshapes the rulebook for Melbourne's mid-scale streets — trading neighbour-led objection rights for prescribed tree canopy, setback and daylight standards, and putting the onus on designers to make the deemed-to-comply envelope produce genuinely liveable buildings.",
      "topics": [
        "Melbourne",
        "Australia",
        "Housing",
        "Policy",
        "Zoning"
      ]

      "id": "2026-04-25-002",
      "date": "2026-04-25",
      "title": "'Grocery-to-housing' developer proposes 415-unit senior tower pair at Oakland Trader Joe's site",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137427-grocery-housing-developer-wants-bring-415-units-senior-housing-oakland-trader",
      "thumbnail": "https://www.planetizen.com/files/images/Screenshot%202026-04-23%20at%2014-10-09%20Oakland%20California%20-%20Google%20Maps.png",
      "summary": "San Francisco developer Align has filed an application to replace the Trader Joe's–anchored retail centre at 5727 College Avenue in Oakland's Rockridge neighbourhood with a pair of senior-housing high-rises of 31 and 25 storeys, delivering 415 residences on a 1.5-acre parcel beside the Rockridge BART station. The programme is split between 371 independent-living units, 18 assisted-living units and 26 memory-care units, with an undisclosed non-profit operator lined up to run the facility. Align filed under California's density bonus law and a statute that exempts qualifying housing projects from CEQA environmental review, allowing the scheme to move forward at heights well above the site's base zoning. The firm has previously pursued a similar \"grocery-to-housing\" model over several Safeway stores in San Francisco, where the grocery component is typically rebuilt at the base of the new towers. Rockridge is different: Albertsons, Safeway's parent, owns the site but is not proposing to replace the Trader Joe's, which is the neighbourhood's only full-service grocer and also the first unionised Trader Joe's in the United States. Community response has been sharply split between housing advocates welcoming dense, transit-adjacent senior homes and residents worried about a food-access desert, the loss of a unionised workforce, and the scale of 31-storey towers dropped into a low-rise commercial strip.",
      "whyItMatters": "The proposal is a stress test for transit-oriented infill under California's density bonus and CEQA exemptions — showing how aggressively those tools can override local scale and land-use expectations, and how \"grocery-to-housing\" conversions land very differently when the grocery doesn't come back.",
      "topics": [
        "US",

        "TOD",

      "id": "2026-04-25-003",
      "date": "2026-04-25",
      "title": "Portland, Maine approved a record number of homes last year — but far fewer got built",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137413-portland-approved-record-number-homes-last-year-far-fewer-got-built",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_2659196087.jpg",
      "summary": "Portland, Maine's planning board approved 1,420 new housing units in 2025 — a city record and nearly a 200 per cent jump from the 477 units approved the year before — yet only 187 homes were actually added to the city's stock, a 68 per cent drop in completions from 2024. The approval surge was concentrated: a handful of particularly large proposals accounted for roughly 95 per cent of the approved units, meaning most of the pipeline rides on the viability of a few deals rather than a broad base of small and mid-sized projects. Developers have repeatedly cited construction costs, interest rates, and the city's 11-year-old inclusionary zoning rule — which requires 25 per cent of units in new buildings to be deemed affordable, or a per-unit opt-out fee — as the decisive barrier between an approved drawing and a finished building. Portland officials launched a formal review of the IZ policy in December, with findings expected in the coming weeks. Housing advocates are split: some argue the approval record proves the policy still attracts development and should be kept; others, including builders, say the gap between 1,420 approvals and 187 completions is itself the evidence that the numbers no longer pencil. The debate previews a wider reckoning for mid-size US cities balancing affordability mandates against feasibility.",
      "whyItMatters": "The 1,420-versus-187 gap reframes how urban designers should read \"housing wins\" — permitting data alone masks whether approved projects are actually deliverable, and whether affordability instruments are cross-subsidising homes or quietly stalling them.",
      "topics": [
        "US",
        "Housing",
        "Policy",
        "Zoning"
      ]

      "id": "2026-04-26-001",
      "date": "2026-04-26",
      "title": "Pasadena adopts vision plan for redeveloping the 710 stub",
      "source": "Urbanize LA",
      "url": "https://la.urbanize.city/post/pasadena-adopts-vision-plan-redeveloping-710-stub",
      "thumbnail": "https://la.urbanize.city/sites/default/files/styles/social_1200x630/public/background/2022-01/710%20stub%20pasadena.jpg?itok=LnnMLWf-",
      "summary": "Pasadena City Council earlier this month adopted the Reconnecting Pasadena vision plan to redevelop approximately 50 acres of land once seized for a never-built 710 Freeway extension. The plan, developed by a consulting team including Perkins Eastman, covers a swath bounded by Union Street, California Boulevard, Pasadena Avenue and St John Avenue. Rather than directly proposing projects, the framework identifies strategies to reconnect the trenched corridor back into the street grid through circulation and development. Key moves include a roundabout at Holly Street to smooth freeway access, converting St. John and Pasadena Avenues from one-way to two-way complete streets, and building a new north-south boulevard along the west side of the trench in place of the existing stub. New east-west connections would extend Valley Street and Bellevue Drive across the corridor. The City Council set a goal of at least 1,800 residential units within the relinquished area. However, the Council excluded restorative justice elements—including targeted affordable housing, business development support and programmes for descendants of those displaced by the original freeway project—from the adopted plan, deferring those provisions for future discussion. The land was seized by Caltrans in the early 1970s, displacing hundreds of residents, primarily Black, Japanese American and Mexican American families. The freeway project was officially killed in 2017 and the corridor relinquished to Pasadena in 2022.",
      "whyItMatters": "The plan demonstrates how cities can reverse mid-century freeway damage through sensitive urban repair, reconnecting severed communities while navigating politically fraught questions about reparative justice and affordable housing obligations after decades of displacement.",
      "topics": [
        "Pasadena",
        "Freeway removal",
        "Urban repair",
        "Restorative justice",
        "Housing policy"
      ]

      "id": "2026-04-26-002",
      "date": "2026-04-26",
      "title": "Social architecture as an urban project",
      "source": "University of Cincinnati",
      "url": "https://www.uc.edu/news/articles/2026/04/n21404093.html",
      "thumbnail": "https://www.uc.edu/content/dam/refresh/daap-62/images/news-articles/daap-peter-yi-historic-housing-cincinnati-banner.jpeg/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg",
      "summary": "Peter Yi, assistant professor in the University of Cincinnati's school of architecture and interior design, is researching how public policy shapes urban form and who gets to live in cities. Yi's work explores architecture not as isolated objects but as part of a larger social system shaped by policy, history and shared visions. One of his recent projects contributes to a forthcoming Springer book titled 'After Urban Renewal,' edited by Gregory Marinic. Yi's chapter focuses on Cincinnati's West End, where urban renewal displaced established communities and public housing was introduced as both response and oversight mechanism. Yi highlights the evolving—and often overlooked—role of public housing within American cities. Unlike market-driven housing motivated by profit, public housing is funded by the federal government, positioning it as a critical part of the housing landscape with a complicated history. In Cincinnati, Yi examines how the built environment reflects layers of history and changing approaches to housing and urban design. He contrasts inward-turning single-family housing with older, denser typologies that engage more directly with the street, such as the breezeway tenement found in Over-the-Rhine—structures combining ground-floor retail with residences above and side entrances that provide light, air and shared space. Yi argues that policy alone does not produce better cities: designers, architects and planners must study the past and present to use them as springboards for the future.",
      "whyItMatters": "Yi's research reframes architecture as urban policy made visible, reminding practitioners that housing typology, tenure and street engagement are never neutral—they encode decades of political choices about who belongs in the city and how communities are built or displaced.",
      "topics": [
        "Cincinnati",
        "Housing typology",
        "Urban renewal",
        "Public housing",
        "Policy and design"
      ]
    },
    {
      "id": "2026-04-27-001",
      "date": "2026-04-27",
      "title": "Podium–Tower Urbanism in Southeast Asia: Density, Management, and the Disappearing Street",
      "source": "ArchDaily",
      "url": "https://www.archdaily.com/1040825/podium-tower-urbanism-in-southeast-asia-density-management-and-the-disappearing-street",
      "thumbnail": "https://images.adsttc.com/media/images/69e6/fe9b/1afd/7001/8891/4664/large_jpg/podium-tower-urbanism-in-southeast-asia-density-management-and-the-disappearing-street_1.jpg?1776746164",
      "summary": "ArchDaily examines the proliferation of podium-tower developments across Southeast Asian cities—from Singapore and Hong Kong to Bangkok, Kuala Lumpur, and Jakarta—analysing how this typology has become the dominant language of metropolitan growth. The model stacks high-density residential or commercial towers above multi-storey retail, parking, and amenity podiums that blanket entire blocks. From an urban planning perspective, the typology is remarkably effective at absorbing congestion, formalising circulation, and delivering density quickly, yet it raises fundamental questions about what it optimises for and what it erodes—especially at street level, where urban life is traditionally negotiated rather than curated. The podium typically carries the logistical and commercial weight—retail, parking, loading, drop-offs, back-of-house services, and amenity decks—while towers stack private programs above. The promise is twofold: maximise urban density while maintaining a 'human-scaled' street wall, and separate the messy logistics of city life from the quieter domain of living and work. Yet as the typology spreads, it often internalises circulation into managed, air-conditioned environments, effectively bypassing the public street and diminishing the informal exchanges, diverse retail ecologies, and spontaneous encounters that have historically defined urban vitality in the region.",
      "whyItMatters": "This analysis offers Melbourne designers a comparative lens on high-density typologies in humid, rapidly urbanising contexts—critical as Melbourne's own planning debates grapple with tower-podium proliferation, street activation mandates, and the tension between efficiency and public life at grade.",
      "topics": [
        "Southeast Asia",
        "Density",
        "Urban Form",
        "Public Realm",
        "High-rise"
      ]
    },
    {
      "id": "2026-04-27-002",
      "date": "2026-04-27",
      "title": "California Legislators Introduce AB 2074 for High-Rise Housing Near Transit Hubs",
      "source": "Planetizen",
      "url": "https://www.njtod.org/news-apr-17-2026/",
      "thumbnail": "https://www.njtod.org/wp-content/uploads/2026/04/featuredimage20260417.png",
      "summary": "California legislators have introduced Assembly Bill 2074, which would streamline approvals and financing for high-rise residential construction in transit-rich areas of the state's largest cities, according to an April 14 announcement by California YIMBY. The bill aims to increase housing supply, improve affordability, and advance climate goals by concentrating dense housing near transit. This follows California's broader legislative push around transit-oriented development, including the recently enacted SB 79 (the Abundant and Affordable Homes Near Transit Act), which establishes minimum guaranteed development standards—floor area ratios, heights, and density—for qualified housing projects located within half a mile of specified transit stops in urban transit counties. SB 79 took effect July 1, 2026, and applies to areas served by light rail, heavy rail, and high-frequency bus routes. Cities are now evaluating compliance pathways, including 'phased implementation' approaches that temporarily exclude sites until 2030, or 'TOD Alternative Plans' that transfer density across zones while maintaining overall net capacity. The combined legislative framework signals a significant state-level intervention into local land-use control, motivated by California's acute housing affordability crisis and climate commitments. Multiple jurisdictions, including Santa Monica, are holding study sessions to discuss local implementation options and potential impacts on existing zoning frameworks.",
      "whyItMatters": "California's aggressive state-level override of local zoning near transit offers a provocative reference point for Australian debates on upzoning, ministerial call-in powers, and the interplay between housing supply, climate policy, and community input—especially relevant as Melbourne contends with its own Activity Centre densification agenda.",
      "topics": [
        "California",
        "TOD",
        "Zoning Reform",
        "State Policy",
        "Housing Supply"
      ]
    },
    {
      "id": "2026-04-27-003",
      "date": "2026-04-27",
      "title": "Street Green Space Can Help Cool Cities, But It Will Not Be Enough on Its Own",
      "source": "IIASA / Environmental Research Letters",
      "url": "https://iiasa.ac.at/news/apr-2026/street-green-space-can-help-cool-cities-but-it-will-not-be-enough-on-its-own",
      "thumbnail": "https://images.unsplash.com/photo-1514565131-fce0801e5785?w=800",
      "summary": "A new study led by the International Institute for Applied Systems Analysis (IIASA), published April 9 in Environmental Research Letters, finds that expanding street green space can reduce urban heat stress in cities worldwide, but even ambitious greening efforts are unlikely to offset a significant share of the additional heat expected under climate change. The research analysed 133 cities globally, modelling the cooling potential of street vegetation under different climate scenarios and urban forms. Results show that street greenery can help reduce heat stress, but benefits are uneven and depend strongly on local conditions. The cooling effect is generally stronger in tropical and continental climates and weaker in dry and temperate zones. Urban form also matters: the most consistent benefits appear in open and low-rise neighbourhoods and large low-rise areas, where greenery has more room to interact with the local microclimate. Under a 'current policies' climate scenario, expanding street greenery at ambitious but realistic levels could offset about 3% to 11% of the expected increase in maximum wet-bulb globe temperature; under a high-emissions scenario, this drops to 2% to 7%. Co-lead author Giacomo Falchetta notes that the study provides globally comparable evidence clarifying both the promise and the limits of street green space as an urban climate adaptation strategy. The authors emphasise that greening needs to be integrated with other measures, such as improved building materials and better urban design, and is not a substitute for broader emissions reduction.",
      "whyItMatters": "This rigorous, globally comparative evidence helps Melbourne designers calibrate expectations for tree canopy and greening programs—showing that while street trees are valuable for heat mitigation, liveability, and amenity, they must sit within a diversified urban climate adaptation portfolio, not stand alone.",
      "topics": [
        "Climate Adaptation",
        "Urban Heat",
        "Green Infrastructure",
        "Evidence-based Design",
        "Global"
      ]
    },
    {
      "id": "2026-04-28-001",
      "date": "2026-04-28",
      "title": "Boston's 'sliver lots' could yield over 1,500 affordable homes",
      "source": "Planetizen",
      "url": "https://www.planetizen.com/news/2026/04/137438-bostons-sliver-lots-could-yield-over-1500-affordable-homes",
      "thumbnail": "https://www.planetizen.com/files/images/shutterstock_2755710057.jpg",
      "summary": "A new proposal from Greater Grove Hall Main Streets and Boston architectural firm Payette offers a strategy for building affordable homes on underutilized city-owned land through modular housing and land-use reforms. Executive director Ed Gaskin explains the plan centres on 1,200 vacant properties owned by the city of Boston, including at least 158 'sliver lots' typically smaller than 3,000 square feet, which are individually dismissed as too small to attract private development but collectively represent a significant public asset. The city has identified around 530 parcels suitable for housing that could translate into 1,500 or more housing units. The Urban Starter Homes proposal treats these parcels as the foundation of a replicable modular housing system, using long-term ground leases from the city that would allow residents to own the homes themselves without paying for land value. Gaskin argues this is far closer to a market-based solution than traditional affordable housing models—one where the public sector retains land and sets conditions while the private market builds, finances and delivers housing at scale. The proposal positions modular construction and ground-lease models as key tools for achieving $100,000 market-rate units.",
      "whyItMatters": "This demonstrates how strategic use of fragmented public landholdings, combined with innovative financing and construction methods, can unlock infill housing in high-cost cities without displacing existing residents or requiring large-scale land assembly.",
      "topics": [
        "Boston",
        "Housing",
        "Infill Development",
        "Public Land",
        "Modular Construction"
      ]
    },
    {
      "id": "2026-04-28-002",
      "date": "2026-04-28",
      "title": "NYC Launches $4 Billion Affordable Housing Initiative Using City Pension Funds",
      "source": "Smart Cities Dive",
      "url": "https://www.njtod.org/news-apr-24-2026/",
      "thumbnail": "https://www.njtod.org/wp-content/uploads/2026/04/featuredimage20260424-1.png",
      "summary": "New York City has launched a $4 billion affordable housing initiative that leverages city pension funds to create and preserve affordable housing units across the five boroughs. Announced on April 21, 2026, the program builds on nearly three decades of precedent: since the 1990s, similar pension-backed investments have supported nearly 200,000 housing units in the city. The new initiative will fund both mixed-income housing construction and expand the Public Private Apartment Rehabilitation program, which targets the preservation of existing affordable stock. The move represents a significant capital commitment at a time when federal housing support remains uncertain, and comes as Mayor Zohran Mamdani's administration pushes to add 200,000 affordable units citywide. The pension fund strategy allows the city to deploy patient capital at scale while generating modest returns for retirees, though critics have raised questions about risk exposure and whether the initiative does enough to address access barriers beyond supply. The initiative is part of a broader city effort to integrate housing policy with infrastructure investment, including transit-oriented development around subway and light rail stations.",
      "whyItMatters": "This signals a bold municipal finance model for affordable housing that bypasses federal dependence, offering a potential template for other high-cost cities seeking to deploy institutional capital at scale while balancing fiduciary responsibility and social goals.",
