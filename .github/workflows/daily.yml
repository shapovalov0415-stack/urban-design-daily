name: Daily urban design digest

on:
  schedule:
    # 21:00 UTC = 06:00 JST (Tokyo, next day)
    - cron: "0 21 * * *"
  workflow_dispatch: # allow manual runs from GitHub UI

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
        run: python scripts/generate_news.py

      - name: Enrich thumbnails (og:image)
        run: python scripts/enrich_thumbnails.py

      - name: Inline data.json into index.html
        run: python scripts/inline_data.py

      - name: Show diff
        run: |
          git --no-pager diff --stat
          git --no-pager status --porcelain

      - name: Commit & push
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name  "urban-design-daily-bot"
          git config user.email "urban-design-daily-bot@users.noreply.github.com"
          git add data.json index.html archive/
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "Add ${DATE} articles"
          git push origin HEAD:main

      - name: Verify GitHub Pages build
        if: success()
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Waiting 60s for Pages build..."
          sleep 60
          if curl -sSL https://shapovalov0415-stack.github.io/urban-design-daily/ | grep -q "$DATE"; then
            echo "✅ ${DATE} appears on the live site."
          else
            echo "⚠️  ${DATE} not yet visible on the live site (Pages build may still be in progress)."
          fi
