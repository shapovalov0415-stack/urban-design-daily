name: Daily urban design digest

on:
  schedule:
    # 14:00 UTC = 00:00 AEST (winter) / 01:00 AEDT (summer) Melbourne, next day.
    # Empirical GHA cron drift on this repo has been 2–3.5 hours, so we book
    # 4h of slack to reliably finish before 06:00 Melbourne local. Worst-case
    # 4h drift = 18:00 UTC = 04:00 AEST / 05:00 AEDT, leaving ~1h margin
    # before the SLA. generate_news.py uses Australia/Melbourne for TODAY,
    # so the date is correct in either AEST or AEDT.
    - cron: "0 14 * * *"
  workflow_dispatch: # allow manual runs from GitHub UI

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-5' }}
        run: python scripts/generate_news.py

      - name: Enrich thumbnails (og:image)
        run: python scripts/enrich_thumbnails.py

      - name: Inline data.json into index.html
        run: python scripts/inline_data.py

      - name: Show diff
        run: |
          git --no-pager diff --stat
          git --no-pager status --porcelain

      - name: Commit & push
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git config user.name  "urban-design-daily-bot"
          git config user.email "urban-design-daily-bot@users.noreply.github.com"
          git add data.json index.html archive/
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git commit -m "Add ${DATE} articles"
          git push origin HEAD:main

      - name: Verify GitHub Pages build
        if: success()
        run: |
          DATE=$(TZ=Australia/Melbourne date +%Y-%m-%d)
          echo "Waiting 60s for Pages build..."
          sleep 60
          if curl -sSL https://shapovalov0415-stack.github.io/urban-design-daily/ | grep -q "$DATE"; then
            echo "✅ ${DATE} appears on the live site."
          else
            echo "⚠️  ${DATE} not yet visible on the live site (Pages build may still be in progress)."
          fi

      - name: Verify daily target (3 articles, ≥1 Australian)
        if: always()
        run: |
          DATE=$(TZ=Australia/Melbourne date +%Y-%m-%d)
          read COUNT AU < <(python3 -c "
          import json
          AU = {'australia','australian','melbourne','sydney','brisbane','perth','adelaide','canberra','hobart','darwin','gold coast','newcastle','wollongong','geelong','victoria','nsw','queensland','wa','sa','tas','nt','act'}
          d = json.load(open('data.json'))
          today = [a for a in d.get('articles', []) if a.get('date','') == '$DATE']
          au = sum(1 for a in today if {(t or '').lower() for t in (a.get('topics') or [])} & AU)
          print(len(today), au)
          ")
          echo "Articles dated ${DATE}: ${COUNT}/3 (Australian ${AU}/1)"
          FAIL=0
          if [ "$COUNT" -lt 3 ]; then
            echo "::error::Only ${COUNT}/3 articles for ${DATE}. Rerun manually to backfill."
            FAIL=1
          fi
          if [ "$AU" -lt 1 ]; then
            echo "::error::No Australia-domestic article for ${DATE}. Rerun manually."
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "✅ Daily target met (3 articles, ≥1 Australian)."
